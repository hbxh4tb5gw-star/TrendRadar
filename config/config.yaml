# TrendRadar 配置文件 - 请勿修改缩进格式

# ==================== 基础设置 ====================
timezone: "Asia/Shanghai"

# 热搜平台开关（true=开启，false=关闭）
platforms:
  # 社会热点
  weibo: true       # 微博热搜
  zhihu: true       # 知乎热榜
  toutiao: true     # 今日头条
  baidu: false      # 百度热搜（暂时关闭）
  bilibili: false   # B站热搜（暂时关闭）
  
  # 小说相关（暂无专用平台，用RSS替代）

# ==================== RSS订阅（小说榜单放这里） ====================
rss_sources:
  - name: "番茄小说热榜"
    url: "https://rsshub.app/toutiao/hot"
    enabled: true
  - name: "知乎盐选热榜"
    url: "https://rsshub.app/zhihu/hotlist"
    enabled: true

# ==================== 通知推送设置 ====================
notification:
  method: "wechat"        # 推送方式: wechat
  sendkey: "SENDKEY"      # Server酱密钥（从GitHub Secrets读取）
  title: "📰 今日热点 & 小说榜单"
  max_items: 15           # 每个平台最多显示多少条

# ==================== 定时任务 ====================
cron: "0 9 * * *"         # 每天上午9点执行
